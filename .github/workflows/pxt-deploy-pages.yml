name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      # ✅ ВОТ ЭТО КЛЮЧ
      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node -e "
            const fs = require('fs');
            const p = 'pxtarget.json';
            const data = JSON.parse(fs.readFileSync(p, 'utf8'));
            data.publicUrl = '/pxt-ev3/';
            fs.writeFileSync(p, JSON.stringify(data, null, 2));
          "

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --githubpages

      - name: Add .nojekyll
        run: touch built/gh-pages/.nojekyll

      - name: Commit and push gh-pages
        run: |
          cd built/gh-pages
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Deploy static site" || echo "No changes"
          git push
