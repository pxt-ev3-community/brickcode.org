name: pxt-deploy-static

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install PXT globally and project deps
        run: |
          npm install -g pxt@8.7.2
          npm ci --ignore-scripts

      - name: Pin legacy deps without pxt-core rebuild
        run: |
          npm install typescript@3.9.10 @types/ws@8.5.4 --save-dev --no-save

      - name: Build static package
        run: pxt staticpkg --route pxt-ev3

      - name: Copy docs static assets
        run: |
          mkdir -p built/packaged/pxt-ev3/docs/static
          cp -R docs/static/* built/packaged/pxt-ev3/docs/static/ 2>/dev/null || true

      - name: Debug find broken paths
        run: |
          echo '=== @cdnUrl@ ==='
          grep -R '@cdnUrl@' built/packaged/pxt-ev3/ || true

          echo '=== doubled pxt-ev3 ==='
          grep -R 'pxt-ev3.*pxt-ev3' built/packaged/pxt-ev3/ || true

          echo '=== tutorial refs ==='
          grep -R 'tutorials.*png' built/packaged/pxt-ev3/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
