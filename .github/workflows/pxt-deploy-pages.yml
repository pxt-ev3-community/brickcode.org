name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'pxtarget.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));

          data.appTheme = data.appTheme || {};

          const base = 'https://theb0nny.github.io/pxt-ev3/';

          data.appTheme.logoUrl = base;
          data.appTheme.homeUrl = base;

          if ('embedUrl' in data.appTheme) data.appTheme.embedUrl = base;
          if ('shareUrl' in data.appTheme) data.appTheme.shareUrl = base;
          if ('organizationUrl' in data.appTheme && data.appTheme.organizationUrl && data.appTheme.organizationUrl.startsWith('/')) {
            data.appTheme.organizationUrl = base;
          }

          if (Array.isArray(data.appTheme.docMenu)) {
            data.appTheme.docMenu = data.appTheme.docMenu.map(item => {
              if (!item) return item;
              const clone = { ...item };

              for (const key of ['path', 'url']) {
                if (typeof clone[key] === 'string' && clone[key].startsWith('/')) {
                  clone[key] = '/pxt-ev3' + clone[key];
                }
              }

              return clone;
            });
          }

          fs.writeFileSync(path, JSON.stringify(data, null, 4) + '\n');
          NODE

      - name: Show patched appTheme
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('pxtarget.json', 'utf8'));
          console.log(JSON.stringify(data.appTheme, null, 2));
          NODE

      - name: Build static package
        run: |
          pxt staticpkg --route pxt-ev3

      - name: Fix GitHub Pages paths
        run: |
          ROOT="built/packaged/pxt-ev3"

          if [ -d "$ROOT" ]; then
            find "$ROOT" -type f \( -name "*.html" -o -name "*.md" -o -name "*.json" -o -name "*.js" -o -name "*.css" \) \
              -exec sed -i \
                -e 's|src="/docs/static/|src="/pxt-ev3/docs/static/|g' \
                -e 's|href="/docs/static/|href="/pxt-ev3/docs/static/|g' \
                -e 's|url(/docs/static/|url(/pxt-ev3/docs/static/|g' \
                -e 's|](/docs/static/|](/pxt-ev3/docs/static/|g' \
                -e 's|"\\/docs\\/static\\/|"/pxt-ev3/docs/static/|g' \
                -e "s|'\\/docs\\/static\\/|'\\/pxt-ev3\\/docs\\/static\\/|g" \
                -e 's|src="/static/|src="/pxt-ev3/static/|g' \
                -e 's|href="/static/|href="/pxt-ev3/static/|g' \
                -e 's|url(/static/|url(/pxt-ev3/static/|g' \
                -e 's|](/static/|](/pxt-ev3/static/|g' \
                -e 's|"\\/static\\/|"/pxt-ev3/static/|g' \
                -e "s|'\\/static\\/|'\\/pxt-ev3\\/static\\/|g" \
              {} +
          fi

      - name: Debug remaining root-relative paths
        run: |
          ROOT="built/packaged/pxt-ev3"

          echo '--- /docs/static leftovers ---'
          grep -R '"/docs/static/' "$ROOT" | head -50 || true
          grep -R "'/docs/static/" "$ROOT" | head -50 || true
          grep -R '](/docs/static/' "$ROOT" | head -50 || true

          echo '--- /static leftovers ---'
          grep -R '"/static/' "$ROOT" | head -50 || true
          grep -R "'/static/" "$ROOT" | head -50 || true
          grep -R '](/static/' "$ROOT" | head -50 || true

          echo '--- /docs leftovers ---'
          grep -R 'href="/docs/' "$ROOT" | head -50 || true
          grep -R 'src="/docs/' "$ROOT" | head -50 || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
