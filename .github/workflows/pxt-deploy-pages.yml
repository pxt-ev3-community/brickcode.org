name: pxt-deploy-gh-pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Build GitHub Pages package
        run: |
          pxt staticpkg --githubpages

      - name: Copy docs static assets into gh-pages checkout
        run: |
          mkdir -p built/gh-pages/docs/static
          cp -r docs/static/* built/gh-pages/docs/static/

      - name: Commit static assets
        run: |
          cd built/gh-pages
          git add .
          git commit -m "Add docs static assets" || echo "No changes"
          git push
