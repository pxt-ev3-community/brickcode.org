name: pxt-deploy-pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new-release]
  push:
    branches:
      - master
  schedule:
    - cron: '32 6 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest release tag of pxt-ev3
        id: vars
        run: |
          TAG=$(gh release view --repo pxt-ev3-community/pxt-ev3 --json tagName --template '{{.tagName}}')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout latest release of pxt-ev3
        uses: actions/checkout@v4
        with:
          repository: pxt-ev3-community/pxt-ev3
          ref: ${{ steps.vars.outputs.tag }}

      - name: Update version in package.json
        run: |
          CLEAN_VERSION=$(echo "${{ steps.vars.outputs.tag }}" | sed 's/^v//')
          sed -i "s/\"version\": \".*\"/\"version\": \"$CLEAN_VERSION\"/" package.json

      - name: Checkout translations
        uses: actions/checkout@v4
        with:
          repository: pxt-ev3-community/pxt-ev3-translations
          path: translations

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PXT globally
        run: npm install -g pxt

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Build static package
        run: ./build_static_package.sh /

      - name: Verify package output exists
        run: |
          test -d built/packaged
          test -f built/packaged/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
