name: pxt-deploy-static

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install -g pxt
          npm install

      - name: Fix old deps
        run: |
          npm install typescript@3.9.10 --save-dev
          npm install @types/ws@7.4.0 --save-dev

      - name: Patch pxtarget.json for GitHub Pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'pxtarget.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));

          data.appTheme = data.appTheme || {};

          data.appTheme.logoUrl = 'https://theb0nny.github.io/pxt-ev3/';
          data.appTheme.homeUrl = 'https://theb0nny.github.io/pxt-ev3/';

          if (data.appTheme.embedUrl) {
            data.appTheme.embedUrl = 'https://theb0nny.github.io/pxt-ev3/';
          }
          if (data.appTheme.shareUrl) {
            data.appTheme.shareUrl = 'https://theb0nny.github.io/pxt-ev3/';
          }

          fs.writeFileSync(path, JSON.stringify(data, null, 4) + '\n');
          
